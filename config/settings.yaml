camera:
  device_id: 0
  width: 640
  height: 480
  fps: 30

tracking:
  model_complexity: 1
  min_detection_confidence: 0.5
  min_tracking_confidence: 0.5

animation:
  model_path: "models/liveportrait"
  avatar_path: "assets/avatar_image.png"
  use_gpu: true

audio:
  sample_rate: 44100
  chunk_size: 1024
  rvc_model: "models/rvc_voice/voice.pth"
  index_path: "models/rvc_voice/voice.index"
  pitch_shift: 0

pipeline:
  max_queue_size: 5
  show_preview: true
  debug_mode: true
  output_stream_url: "ws://localhost:8000/stream"
